spring:
  application:
    name: carbon-calculator

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/carboncalculator}
    username: ${SPRING_DATASOURCE_USERNAME:carboncalc}
    password: ${SPRING_DATASOURCE_PASSWORD:carboncalc_dev_2024}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:7A9D2F4B6C8E1G3H5I7J9K1L3M5N7O9P1Q3R5S7T9U1V3W5X7Y9Z}
  expiration-ms: ${JWT_EXPIRATION_MS:900000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

logging:
  level:
    com.capgemini: DEBUG
    org.springframework.security: INFO
